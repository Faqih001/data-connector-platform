services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    ports:
      - "8001:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DATABASE_URL=postgresql://user:password@db:5432/dataconnector
      - DOCKER_ENV=1
    depends_on:
      db:
        condition: service_started
      mysql:
        condition: service_started
      mongo:
        condition: service_started
      clickhouse:
        condition: service_started
    networks:
      - app-network

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=dataconnector
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432"
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    ports:
      - "3307:3306"
    networks:
      - app-network

  mongo:
    image: mongo:4.4
    ports:
      - "27018:27017"
    networks:
      - app-network

  clickhouse:
    image: yandex/clickhouse-server
    ports:
      - "8124:8123"
      - "9001:9000"
    networks:
      - app-network

volumes:
  media_volume:
    driver: local

networks:
  app-network:
    driver: bridge

