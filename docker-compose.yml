version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
    depends_on:
      db:
        condition: service_started
      mysql:
        condition: service_started
      mongo:
        condition: service_started
      clickhouse:
        condition: service_started
    networks:
      - app-network

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=dataconnector
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5433"
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    ports:
      - "3306:3307"
    networks:
      - app-network

  mongo:
    image: mongo:4.4
    ports:
      - "27017:27018"
    networks:
      - app-network

  clickhouse:
    image: yandex/clickhouse-server
    ports:
      - "8123:8124"
      - "9000:9001"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

